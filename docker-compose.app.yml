services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: ultima-mailpit-app
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    image: node:22
    container_name: ultima-app
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "apt-get update && apt-get install -y ffmpeg && npm install && npm run server:localdb:dev"
    environment:
      DB_CLIENT: postgres
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: admin
      PG_DATABASE: ultima_demo
      DB_STARTUP_RETRY_ATTEMPTS: 240
      DB_STARTUP_RETRY_DELAY_MS: 1000
      PORT: 3001
      SMARTPLAY_GENERATE_BROWSER_PREVIEW: 1
      FFMPEG_PATH: ffmpeg
      PUBLIC_WEB_BASE_URL: http://localhost:5173
      JWT_SECRET: ultima-demo-secret
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_FROM: noreply@ultima.local
    ports:
      - "4001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
