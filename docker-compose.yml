name: ultima-demo

services:
  redis:
    image: redis:7-alpine
    container_name: ultima-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: ultima-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  db:
    image: postgres:17-alpine
    container_name: ultima-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ultima_web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ultima_web"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres_init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./database/smartplay_upgrade.sql:/docker-entrypoint-initdb.d/02-smartplay.sql:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ultima-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3001/api/health" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 600s
    environment:
      DB_CLIENT: postgres
      PG_HOST: db
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: admin
      PG_DATABASE: ultima_web
      JWT_SECRET: ultima-demo-secret
      PORT: 3001
      REDIS_URL: redis://redis:6379
      SMARTPLAY_AI_URL: ${SMARTPLAY_AI_URL:-}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-http://localhost:5173}
      SMTP_HOST: ${SMTP_HOST_DOCKER:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@ultima.local}
    ports:
      - "3001:3001"
    volumes: []

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: ultima-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: http://api:3001
    ports:
      - "5173:5173"
    volumes: []

volumes:
  postgres_data:
  redis_data:
