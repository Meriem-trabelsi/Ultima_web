name: ultima-demo

services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: ultima-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  db:
    image: mysql:8.4
    container_name: ultima-db
    restart: unless-stopped
    command: ["mysqld", "--mysql-native-password=ON"]
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: ultima_demo
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-padmin" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/mysql_demo_dump.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./database/multi_arena_upgrade.sql:/docker-entrypoint-initdb.d/02-upgrade.sql:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ultima-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3001/api/health" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 600s
    environment:
      DB_CLIENT: ${DB_CLIENT:-mysql}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: admin
      MYSQL_DATABASE: ultima_demo
      PG_HOST: ${PG_HOST:-host.docker.internal}
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-}
      PG_DATABASE: ${PG_DATABASE:-ultima_demo}
      JWT_SECRET: ultima-demo-secret
      PORT: 3001
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-http://localhost:5173}
      SMTP_HOST: ${SMTP_HOST_DOCKER:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@ultima.local}
    ports:
      - "3001:3001"
    volumes: []

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: ultima-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: http://api:3001
    ports:
      - "5173:5173"
    volumes: []

volumes:
  mysql_data:
